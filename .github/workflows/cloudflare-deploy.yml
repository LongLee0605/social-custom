# Tùy chọn — chỉ dùng khi bạn deploy lên Cloudflare Pages (KHÔNG phải Firebase).
# Cần secrets: CLOUDFLARE_API_TOKEN, CLOUDFLARE_ACCOUNT_ID (tạo tại dash.cloudflare.com).
# Deploy Firebase: dùng workflow firebase-deploy.yml thay thế.

name: Cloudflare Pages (optional)

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ secrets.CLOUDFLARE_API_TOKEN != '' && secrets.CLOUDFLARE_ACCOUNT_ID != '' }}
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Java (Firestore rules emulator)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install dependencies
        run: npm ci --include=optional

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test

      - name: Test Firestore rules
        run: npm run test:rules

      - name: Build
        run: npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: social-custom
          directory: dist

  missing-secrets:
    runs-on: ubuntu-latest
    if: ${{ secrets.CLOUDFLARE_API_TOKEN == '' || secrets.CLOUDFLARE_ACCOUNT_ID == '' }}
    steps:
      - name: Skip — Cloudflare secrets not configured
        run: |
          echo "Thiếu CLOUDFLARE_API_TOKEN hoặc CLOUDFLARE_ACCOUNT_ID."
          echo "Deploy Firebase: push lên main → workflow 'Deploy to Firebase Hosting'."
          echo "Firebase web config (apiKey, projectId...) KHÔNG dùng cho Cloudflare."
