name: Deploy to Firebase Hosting

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      deploy_firestore:
        description: Deploy Firestore rules & indexes (cần IAM đủ quyền)
        type: boolean
        default: true

concurrency:
  group: firebase-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  JAVA_VERSION: '17'
  FIREBASE_PROJECT: my-social-9bc6a

jobs:
  build-and-test:
    name: Build & test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Install dependencies
        run: npm ci --include=optional

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test

      - name: Firestore rules tests
        run: npm run test:rules

      - name: Production build
        run: npm run build

      - name: Verify dist output
        run: |
          test -f dist/index.html
          test -f dist/sw.js
          test -f dist/manifest.json
          echo "dist ready ($(du -sh dist | cut -f1))"

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          if-no-files-found: error
          retention-days: 3

  deploy-firebase:
    name: Deploy to Firebase
    needs: build-and-test
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download dist
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install Firebase CLI
        run: npm ci --include=optional

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Deploy Hosting
        id: hosting
        run: |
          npx firebase deploy \
            --only hosting \
            --project "${{ env.FIREBASE_PROJECT }}" \
            --non-interactive

      - name: Deploy Firestore rules
        id: firestore-rules
        if: github.event_name != 'workflow_dispatch' || inputs.deploy_firestore != false
        continue-on-error: true
        run: |
          npx firebase deploy \
            --only firestore:rules \
            --project "${{ env.FIREBASE_PROJECT }}" \
            --non-interactive

      - name: Deploy Firestore indexes
        id: firestore-indexes
        if: github.event_name != 'workflow_dispatch' || inputs.deploy_firestore != false
        continue-on-error: true
        run: |
          npx firebase deploy \
            --only firestore:indexes \
            --project "${{ env.FIREBASE_PROJECT }}" \
            --non-interactive

      - name: Firestore deploy hint
        if: steps.firestore-rules.outcome == 'failure' || steps.firestore-indexes.outcome == 'failure'
        run: |
          echo "::warning::Firestore deploy failed. Hosting đã deploy."
          echo "403: thêm role Firebase Admin — docs/FIREBASE_CI_SETUP.md"
          echo "400 index: đã bỏ index thừa trong firestore.indexes.json"

      - name: Deployment URL
        if: steps.hosting.outcome == 'success'
        run: |
          echo "Live: https://${{ env.FIREBASE_PROJECT }}.web.app"
          echo "Live: https://${{ env.FIREBASE_PROJECT }}.firebaseapp.com"
